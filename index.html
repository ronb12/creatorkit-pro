<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CreatorKit Pro</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Frontend Differentiation Pass</p>
          <h1>CreatorKit Pro</h1>
          <p class="lede">
            Run your content calendar, sponsorship pipeline, and live deliverables
            from one production workspace.
          </p>
        </div>
        <div class="hero-card">
          <span class="hero-label">Workflow</span>
          <strong>Hooks to pitches to publish dates</strong>
          <p>Built for creators managing short-form content and paid brand work.</p>
        </div>
      </section>

      <nav class="subnav" aria-label="CreatorKit views">
        <button class="subnav-tab active" data-tab="studio" type="button">Studio</button>
        <button class="subnav-tab" data-tab="pipeline" type="button">Pipeline</button>
        <button class="subnav-tab" data-tab="deliverables" type="button">Deliverables</button>
        <button class="subnav-tab" data-tab="calendar" type="button">Calendar</button>
      </nav>

      <section id="app" class="app-shell">
        <div class="loading-card">Loading CreatorKit Pro...</div>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
